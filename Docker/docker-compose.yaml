services:
  postgres:
    image: postgres:17
    container_name: worklog-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    container_name: redis_wl
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: always
    ports:
      - "${REDIS_PORT}:6379"

volumes:
  pgdata: